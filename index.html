<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pizza Store Simulator</title>
<style>
  :root {
    --bg: #0c0a14;
    --bg2: #130f1f;
    --panel: #17131f;
    --panel2: #1e1929;
    --border: rgba(255, 255, 255, 0.07);
    --border2: rgba(255, 255, 255, 0.12);
    --text: #ECEAF2;
    --muted: #8a839c;
    --faint: #5e576e;
    --accent: #ff5470;
    --accent2: #ffb547;
    --green: #45e0a0;
    --red: #ff5470;
    --blue: #6aa6ff;
    --shadow: 0 18px 40px -20px rgba(0, 0, 0, 0.8);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(255, 84, 112, 0.10), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(255, 181, 71, 0.08), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(106, 166, 255, 0.07), transparent 60%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    min-height: 100vh;
    letter-spacing: .2px;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 20px 48px; }

  header { margin-bottom: 26px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .mark {
    width: 46px; height: 46px; flex: 0 0 46px;
    border-radius: 14px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 10px 24px -8px rgba(255, 84, 112, 0.6);
    color: #1a0c12;
  }
  .brand .mark svg { width: 26px; height: 26px; }
  header h1 {
    margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px;
  }
  header .sub { margin: 2px 0 0; color: var(--muted); font-size: .82rem; }

  /* ---- controls ---- */
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 22px;
    box-shadow: var(--shadow);
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: .68rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.2px; font-weight: 600;
  }
  .field input {
    background: #100c19;
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 11px;
    width: 104px;
    font-size: 1rem;
    font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 84, 112, 0.18);
  }
  .spacer { flex: 1 1 auto; }
  button {
    font-family: inherit;
    border: none;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: 12px;
    cursor: pointer;
    font-size: .95rem;
    transition: transform .12s ease, box-shadow .2s, opacity .2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a0c12;
    box-shadow: 0 12px 26px -10px rgba(255, 84, 112, 0.7);
  }
  .btn-start:hover:not(:disabled) { transform: translateY(-2px); }
  .btn-ghost {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--faint); transform: translateY(-2px); }
  button:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ---- stations ---- */
  .stations {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px;
  }
  .station {
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px;
    text-align: center;
    min-height: 168px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .station::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: .65;
  }
  .station .badge {
    width: 40px; height: 40px; margin: 4px auto 10px;
    border-radius: 12px; display: grid; place-items: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border2);
    color: var(--accent2);
  }
  .station .badge svg { width: 22px; height: 22px; }
  .station h3 { margin: 0; font-size: .82rem; font-weight: 600; letter-spacing: .2px; }
  .station .cap { font-size: .72rem; color: var(--muted); margin: 5px 0 10px; font-variant-numeric: tabular-nums; }
  .station .cap b { color: var(--text); }
  .bar {
    height: 7px; background: #100c19; border-radius: 6px; overflow: hidden; margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent2));
    transition: width .35s ease;
  }
  .queue { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 22px; }
  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    box-shadow: 0 0 8px var(--dot, var(--accent));
    animation: pop .3s ease;
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ---- stats ---- */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px; margin-bottom: 22px;
  }
  .stat {
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .stat .v { font-size: 1.7rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 7px; font-weight: 600; }
  .stat.profit .v { color: var(--green); }
  .stat.fail .v { color: var(--red); }

  /* ---- log ---- */
  .log {
    background: #0a0710;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    height: 230px;
    overflow-y: auto;
    font-family: "JetBrains Mono", "Consolas", ui-monospace, monospace;
    font-size: .82rem;
    line-height: 1.65;
    box-shadow: var(--shadow);
  }
  .log::-webkit-scrollbar { width: 9px; }
  .log::-webkit-scrollbar-thumb { background: var(--panel2); border-radius: 8px; }
  .log .ok { color: var(--green); }
  .log .bad { color: var(--red); }
  .log .info { color: var(--muted); }
  .log .head { color: var(--text); font-weight: 600; }
  .log .rule { color: var(--faint); }

  @media (max-width: 720px) {
    .stations { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7l9-3 9 3-9 16z"/><circle cx="10" cy="9" r="1"/><circle cx="13.5" cy="12.5" r="1"/><circle cx="9.5" cy="14" r="1"/>
        </svg>
      </div>
      <div>
        <h1>Pizza Store Simulator</h1>
        <p class="sub">Multithreaded C backend, visualized</p>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="field">
      <label>Customers</label>
      <input type="number" id="customers" value="15" min="1" max="100" />
    </div>
    <div class="field">
      <label>Seed</label>
      <input type="number" id="seed" value="42" />
    </div>
    <div class="field">
      <label>Speed (x)</label>
      <input type="number" id="speed" value="40" min="1" max="500" />
    </div>
    <div class="spacer"></div>
    <button id="startBtn" class="btn-start">Start</button>
    <button id="resetBtn" class="btn-ghost">Reset</button>
  </div>

  <div class="stations" id="stations"></div>

  <div class="stats" id="stats"></div>

  <div class="log" id="log"></div>
</div>

<script>
// ====== Constants — mirror of pizza.h ======
const CONFIG = {
  number_of_telephone_operators: 2,
  number_of_cooks: 2,
  number_of_ovens: 10,
  number_of_packers: 2,
  number_of_deliverers: 10,

  time_orderhigh: 5,
  number_orderhigh: 5,

  propability_of_margarita: 0.45,
  propability_of_pepperone: 0.35,
  propability_of_special: 0.2,

  time_paymenthigh: 3,
  propability_of_failure: 0.05,

  cost_of_margarita: 12,
  cost_of_pepperone: 14,
  cost_of_special: 15,

  time_of_preparation: 1,
  time_of_bake: 10,
  time_of_pack: 1,

  time_orderlow: 1,
};

// inline SVG icons (no emojis)
const ICONS = {
  phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 16 0"/><rect x="2" y="12" width="4" height="7" rx="1.5"/><rect x="18" y="12" width="4" height="7" rx="1.5"/><path d="M20 19a3 3 0 0 1-3 3h-3"/></svg>',
  chef: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14v6h12v-6"/><path d="M18 14a4 4 0 0 0 .4-7.96A5 5 0 0 0 9 4.6 4 4 0 0 0 6 14z"/><path d="M9 17h6"/></svg>',
  flame: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1.2 3 4 4.2 4 8a4 4 0 0 1-8 0c0-1.6.6-2.6 1.2-3.2.4 1 1.3 1.5 1.3 1.5C11 7 11.4 4.6 12 3z"/></svg>',
  box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/></svg>',
  scooter: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M8.4 18h7.2M18 18l-2.6-9H13"/><path d="M4 9h5l2.2 5"/></svg>',
};

const STATIONS = [
  { key: 'operators',  name: 'Phone operators', icon: ICONS.phone,   cap: 'number_of_telephone_operators' },
  { key: 'cooks',      name: 'Cooks',           icon: ICONS.chef,    cap: 'number_of_cooks' },
  { key: 'ovens',      name: 'Ovens',           icon: ICONS.flame,   cap: 'number_of_ovens' },
  { key: 'packers',    name: 'Packing',         icon: ICONS.box,     cap: 'number_of_packers' },
  { key: 'deliverers', name: 'Delivery',        icon: ICONS.scooter, cap: 'number_of_deliverers' },
];

// ====== rand_r equivalent (same LCG as the C Windows fallback) ======
function makeRand(seed) {
  let s = seed >>> 0;
  return function () {
    s = (Math.imul(s, 1103515245) + 12345) >>> 0;
    s = s % (1 << 31);
    return s;
  };
}

// ====== State ======
let state = null;
let running = false;

function buildUI() {
  const sc = document.getElementById('stations');
  sc.innerHTML = '';
  STATIONS.forEach(st => {
    const cap = CONFIG[st.cap];
    const div = document.createElement('div');
    div.className = 'station';
    div.innerHTML = `
      <div class="badge">${st.icon}</div>
      <h3>${st.name}</h3>
      <div class="cap">free <b id="free-${st.key}">${cap}</b> / ${cap}</div>
      <div class="bar"><span id="bar-${st.key}" style="width:100%"></span></div>
      <div class="queue" id="q-${st.key}"></div>
    `;
    sc.appendChild(div);
  });

  const stats = [
    { id: 'revenue', l: 'Revenue ($)', cls: 'profit', v: 0 },
    { id: 'success', l: 'Successful', cls: '', v: 0 },
    { id: 'fail', l: 'Cancelled', cls: 'fail', v: 0 },
    { id: 'margarita', l: 'Margarita', cls: '', v: 0 },
    { id: 'pepperone', l: 'Pepperoni', cls: '', v: 0 },
    { id: 'special', l: 'Special', cls: '', v: 0 },
    { id: 'avgservice', l: 'Avg. service time', cls: '', v: '–' },
    { id: 'active', l: 'Active', cls: '', v: 0 },
  ];
  const sd = document.getElementById('stats');
  sd.innerHTML = '';
  stats.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stat ' + s.cls;
    d.innerHTML = `<div class="v" id="stat-${s.id}">${s.v}</div><div class="l">${s.l}</div>`;
    sd.appendChild(d);
  });
}

function resetState() {
  state = {
    free: {
      operators: CONFIG.number_of_telephone_operators,
      cooks: CONFIG.number_of_cooks,
      ovens: CONFIG.number_of_ovens,
      packers: CONFIG.number_of_packers,
      deliverers: CONFIG.number_of_deliverers,
    },
    queues: { operators: [], cooks: [], ovens: [], packers: [], deliverers: [] },
    revenue: 0, success: 0, fail: 0,
    margarita: 0, pepperone: 0, special: 0,
    sumService: 0, active: 0,
  };
  document.getElementById('log').innerHTML = '';
  refresh();
}

function refresh() {
  STATIONS.forEach(st => {
    const cap = CONFIG[st.cap];
    const free = state.free[st.key];
    document.getElementById('free-' + st.key).textContent = free;
    document.getElementById('bar-' + st.key).style.width = (free / cap * 100) + '%';
    const q = document.getElementById('q-' + st.key);
    q.innerHTML = state.queues[st.key].map(p =>
      `<div class="dot" title="order #${p.id}" style="background:${p.color};--dot:${p.color}"></div>`
    ).join('');
  });
  set('revenue', state.revenue);
  set('success', state.success);
  set('fail', state.fail);
  set('margarita', state.margarita);
  set('pepperone', state.pepperone);
  set('special', state.special);
  set('active', state.active);
  set('avgservice', state.success ? (state.sumService / state.success).toFixed(1) + 'm' : '–');
}
function set(id, v) { document.getElementById('stat-' + id).textContent = v; }

function log(msg, cls) {
  const l = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  l.appendChild(line);
  l.scrollTop = l.scrollHeight;
}

// scaled sleep — 1 simulated "minute" = (1000/speed) ms
function sleep(minutes) {
  const speed = Math.max(1, +document.getElementById('speed').value);
  return new Promise(r => setTimeout(r, minutes * 1000 / speed));
}

// occupy a resource (waits if none free) — models pthread_cond_wait
async function acquire(key, n = 1) {
  while (state.free[key] < n) { await sleep(0.2); }
  state.free[key] -= n;
  refresh();
}
function release(key, n = 1) {
  state.free[key] += n;
  refresh();
}

function enqueue(key, p) { state.queues[key].push(p); refresh(); }
function dequeue(key, p) {
  state.queues[key] = state.queues[key].filter(x => x !== p);
  refresh();
}

const PIZZA_COLORS = { margarita: '#ffb547', pepperone: '#ff5470', special: '#45e0a0' };

async function customer(id, rand) {
  state.active++; refresh();
  const startService = performance.now();
  const token = { id, color: '#6aa6ff' };

  // --- telephone operator ---
  enqueue('operators', token);
  await acquire('operators');
  dequeue('operators', token);

  const numPizzas = rand() % CONFIG.number_orderhigh + 1;
  const nMarg = Math.round(numPizzas * CONFIG.propability_of_margarita);
  const nPep  = Math.round(numPizzas * CONFIG.propability_of_pepperone);
  const nSpec = Math.round(numPizzas * CONFIG.propability_of_special);

  await sleep(rand() % CONFIG.time_paymenthigh + 1); // payment check

  // 5% failure (1 out of 20) — same as C
  if (rand() % 20 + 1 === 1) {
    state.fail++;
    release('operators');
    state.active--;
    log(`Order #${id} cancelled (payment declined)`, 'bad');
    refresh();
    return;
  }

  state.success++;
  state.revenue += nMarg * CONFIG.cost_of_margarita + nPep * CONFIG.cost_of_pepperone + nSpec * CONFIG.cost_of_special;
  state.margarita += nMarg; state.pepperone += nPep; state.special += nSpec;
  release('operators');
  log(`Order #${id} added  —  ${numPizzas} pizzas (M:${nMarg} P:${nPep} S:${nSpec})`, 'ok');

  const pizza = { id, color: PIZZA_COLORS.margarita };

  // --- cook ---
  enqueue('cooks', pizza);
  await acquire('cooks');
  await sleep(numPizzas * CONFIG.time_of_preparation);
  dequeue('cooks', pizza);

  // --- ovens (needs numPizzas ovens) ---
  enqueue('ovens', pizza);
  await acquire('ovens', numPizzas);
  release('cooks');
  await sleep(CONFIG.time_of_bake);
  dequeue('ovens', pizza);

  // --- packer ---
  enqueue('packers', pizza);
  await acquire('packers');
  release('ovens', numPizzas);
  await sleep(numPizzas * CONFIG.time_of_pack);
  dequeue('packers', pizza);
  release('packers');

  // --- deliverer ---
  enqueue('deliverers', pizza);
  await acquire('deliverers');
  dequeue('deliverers', pizza);
  const deliveryTime = rand() % CONFIG.time_orderhigh + 1;
  await sleep(deliveryTime);          // deliver
  const endService = performance.now();
  await sleep(deliveryTime);          // return to store
  release('deliverers');

  const serviceMin = (endService - startService) / (1000 / Math.max(1, +document.getElementById('speed').value));
  state.sumService += serviceMin;
  state.active--;
  log(`Order #${id} delivered  —  service ~${serviceMin.toFixed(1)}m`, 'info');
  refresh();
}

async function run() {
  if (running) return;
  running = true;
  document.getElementById('startBtn').disabled = true;
  resetState();

  const n = Math.max(1, Math.min(100, +document.getElementById('customers').value));
  const seed = +document.getElementById('seed').value || 1;
  const rand = makeRand(seed);

  log(`Starting simulation: ${n} customers, seed=${seed}`, 'head');

  const tasks = [];
  for (let i = 1; i <= n; i++) {
    tasks.push(customer(i, rand));
    await sleep(rand() % CONFIG.time_orderhigh + 1); // gap between customers
  }
  await Promise.all(tasks);

  log('────────────────────────────', 'rule');
  log(`Total revenue: ${state.revenue} $`, 'ok');
  log(`Successful: ${state.success}   Cancelled: ${state.fail}`, 'info');
  log(`Pizzas — Margarita:${state.margarita}  Pepperoni:${state.pepperone}  Special:${state.special}`, 'info');
  if (state.success) log(`Average service time: ${(state.sumService / state.success).toFixed(2)}m`, 'info');
  log('Completed', 'head');

  running = false;
  document.getElementById('startBtn').disabled = false;
}

document.getElementById('startBtn').addEventListener('click', run);
document.getElementById('resetBtn').addEventListener('click', () => { if (!running) resetState(); });

buildUI();
resetState();
</script>
</body>
</html>
